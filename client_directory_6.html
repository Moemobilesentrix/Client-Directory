<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moe Sales CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --font: 'Inter', -apple-system, sans-serif; --t: 0.18s ease; }

[data-theme="dark"] {
  --bg-base:    #0c0c0d;
  --bg-surface: #111113;
  --bg-card:    #17171a;
  --bg-hover:   #1d1d21;
  --bg-input:   #1a1a1e;
  --bg-pill:    #1e1e22;
  --border:     rgba(255,255,255,0.06);
  --border-md:  rgba(255,255,255,0.10);
  --border-hi:  rgba(255,255,255,0.18);
  --text-1:     #f2f2f3;
  --text-2:     #8a8a90;
  --text-3:     #44444c;
  --green:      #34d399; --green-bg: rgba(52,211,153,0.10); --green-bd: rgba(52,211,153,0.22);
  --amber:      #fbbf24; --amber-bg: rgba(251,191,36,0.10); --amber-bd: rgba(251,191,36,0.22);
  --red:        #f87171; --red-bg:   rgba(248,113,113,0.10); --red-bd:   rgba(248,113,113,0.22);
  --shadow:     0 1px 2px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-lg:  0 8px 28px rgba(0,0,0,0.55);
}
[data-theme="light"] {
  --bg-base:    #f4f4f6;
  --bg-surface: #ffffff;
  --bg-card:    #ffffff;
  --bg-hover:   #f8f8fa;
  --bg-input:   #f4f4f6;
  --bg-pill:    #ededf0;
  --border:     rgba(0,0,0,0.06);
  --border-md:  rgba(0,0,0,0.10);
  --border-hi:  rgba(0,0,0,0.20);
  --text-1:     #111112;
  --text-2:     #6b6b74;
  --text-3:     #b0b0b9;
  --green:      #059669; --green-bg: rgba(5,150,105,0.08); --green-bd: rgba(5,150,105,0.22);
  --amber:      #d97706; --amber-bg: rgba(217,119,6,0.08);  --amber-bd: rgba(217,119,6,0.22);
  --red:        #dc2626; --red-bg:   rgba(220,38,38,0.07);  --red-bd:   rgba(220,38,38,0.20);
  --shadow:     0 1px 3px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.05);
  --shadow-lg:  0 8px 28px rgba(0,0,0,0.11);
}

html, body {
  font-family: var(--font); background: var(--bg-base); color: var(--text-1);
  min-height: 100vh; font-size: 13px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; transition: background var(--t), color var(--t);
}

/* TOPBAR */
.topbar {
  height: 54px; padding: 0 1.5rem; background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  transition: background var(--t), border-color var(--t);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--t); }
[data-theme="dark"]  .brand-mark { background: #fff; }
[data-theme="light"] .brand-mark { background: #111; }
.brand-mark svg { width: 14px; height: 14px; }
[data-theme="dark"]  .brand-mark svg { fill: #000; }
[data-theme="light"] .brand-mark svg { fill: #fff; }
.brand-fields { display: flex; align-items: center; gap: 6px; }
.editable-field {
  font-size: 13px; font-weight: 600; color: var(--text-1);
  background: transparent; border: 1px solid transparent;
  border-radius: 5px; padding: 2px 6px; outline: none;
  font-family: var(--font); cursor: text;
  transition: border-color var(--t), background var(--t); min-width: 40px;
}
.editable-field.sub { font-weight: 400; color: var(--text-2); font-size: 12px; }
.editable-field:hover { border-color: var(--border-md); background: var(--bg-input); }
.editable-field:focus { border-color: var(--border-hi); background: var(--bg-input); }
.brand-sep { color: var(--text-3); font-size: 13px; }
.edit-hint { font-size: 10px; color: var(--text-3); margin-left: 2px; display: flex; align-items: center; gap: 3px; user-select: none; }
.edit-hint svg { width: 10px; height: 10px; }
.topbar-actions { display: flex; align-items: center; gap: 6px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 5px; height: 32px; padding: 0 12px; border-radius: 7px; border: 1px solid transparent; font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all var(--t); }
.btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.btn-ghost { background: transparent; border-color: var(--border-md); color: var(--text-2); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-1); border-color: var(--border-hi); }
[data-theme="dark"]  .btn-primary { background: #fff; color: #000; border-color: #fff; }
[data-theme="light"] .btn-primary { background: #111; color: #fff; border-color: #111; }
.btn-primary:hover { opacity: 0.86; }
.btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
.btn-green:hover { opacity: 0.78; }
.btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red-bd); }
.btn-red:hover { opacity: 0.78; }
.theme-toggle { width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border-md); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); transition: all var(--t); }
.theme-toggle:hover { background: var(--bg-hover); color: var(--text-1); border-color: var(--border-hi); }
.theme-toggle svg { width: 14px; height: 14px; }

/* SUMMARY BAR */
.summary-bar {
  padding: 10px 1.5rem; background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  transition: background var(--t);
}
.sum-card {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
}
.sum-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
.sum-val { font-size: 13px; font-weight: 600; }
.sum-val.green { color: var(--green); }
.sum-val.amber { color: var(--amber); }
.sum-sep { width: 1px; height: 16px; background: var(--border-md); }

/* TOOLBAR */
.toolbar { padding: 11px 1.5rem; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; transition: background var(--t), border-color var(--t); }
.search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
.s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--text-3); pointer-events: none; }
.search-input { width: 100%; height: 32px; padding: 0 10px 0 30px; background: var(--bg-input); border: 1px solid var(--border-md); border-radius: 7px; font-family: var(--font); font-size: 12px; color: var(--text-1); outline: none; transition: all var(--t); }
.search-input::placeholder { color: var(--text-3); }
.search-input:focus { border-color: var(--border-hi); background: var(--bg-card); }
.view-seg { display: flex; border: 1px solid var(--border-md); border-radius: 7px; overflow: hidden; }
.vseg-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--text-3); cursor: pointer; transition: all var(--t); }
.vseg-btn svg { width: 13px; height: 13px; }
.vseg-btn.active { background: var(--bg-hover); color: var(--text-1); }
.vseg-btn:not(:last-child) { border-right: 1px solid var(--border-md); }
.count-chip { margin-left: auto; font-size: 11px; color: var(--text-2); background: var(--bg-pill); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; transition: background var(--t); }

/* MAIN */
.main { padding: 1.25rem 1.5rem; }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr)); gap: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 11px; padding: 16px; position: relative; box-shadow: var(--shadow); transition: border-color var(--t), background var(--t), box-shadow var(--t); }
.card:hover { border-color: var(--border-md); box-shadow: var(--shadow-lg); background: var(--bg-hover); }
.card-top { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
.av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; flex-shrink: 0; letter-spacing: 0.02em; }
.cid-badge { font-size: 10px; font-weight: 500; color: var(--text-3); background: var(--bg-pill); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; letter-spacing: 0.03em; transition: background var(--t); }
.sep { height: 1px; background: var(--border); margin: 11px 0; }
.card-row { margin-bottom: 8px; }
.card-row:last-child { margin-bottom: 0; }
.row-lbl { font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.row-val { font-size: 12px; color: var(--text-1); line-height: 1.4; }
.row-val.strong { font-weight: 500; }
.row-val.money { font-weight: 600; font-size: 13px; }
.row-val.money.green { color: var(--green); }
.row-val.money.amber { color: var(--amber); }

/* spending row inline */
.spend-row { display: flex; gap: 8px; margin-top: 8px; }
.spend-cell { flex: 1; background: var(--bg-pill); border: 1px solid var(--border); border-radius: 7px; padding: 7px 9px; }
.spend-cell .row-lbl { margin-bottom: 3px; }

.card-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; opacity: 0; transition: opacity var(--t); }
.card:hover .card-btns { opacity: 1; }
.ic-btn { width: 24px; height: 24px; border-radius: 5px; background: var(--bg-pill); border: 1px solid var(--border-md); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: all var(--t); }
.ic-btn svg { width: 11px; height: 11px; }
.ic-btn:hover { background: var(--bg-hover); color: var(--text-1); border-color: var(--border-hi); }
.ic-btn.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-bd); }

/* TABLE */
.tbl-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; box-shadow: var(--shadow); transition: background var(--t); }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--bg-input); }
th { padding: 9px 14px; text-align: left; font-size: 9px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-1); font-size: 12px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }
.td-cid { font-size: 10px; font-weight: 600; color: var(--text-3); font-family: 'SF Mono', monospace; letter-spacing: 0.04em; }
.td-name { display: flex; align-items: center; gap: 9px; }
.av-sm { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; }
.td-biz { font-weight: 500; }
.td-money { font-weight: 600; font-size: 12px; }
.td-money.green { color: var(--green); }
.td-money.amber { color: var(--amber); }
.td-acts { display: flex; gap: 4px; justify-content: flex-end; }

/* EMPTY */
.empty { text-align: center; padding: 4rem 1rem; color: var(--text-3); font-size: 13px; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.62); z-index: 400; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.overlay.open { display: flex; }
.modal { background: var(--bg-surface); border: 1px solid var(--border-md); border-radius: 14px; padding: 24px; width: 420px; max-width: calc(100vw - 2rem); box-shadow: var(--shadow-lg); transition: background var(--t); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 14px; font-weight: 600; color: var(--text-1); }
.modal-close { width: 24px; height: 24px; border-radius: 5px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); transition: all var(--t); }
.modal-close:hover { background: var(--bg-hover); color: var(--text-1); }
.modal-close svg { width: 12px; height: 12px; }
.modal-section { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 10px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.fg input { width: 100%; height: 34px; padding: 0 11px; background: var(--bg-input); border: 1px solid var(--border-md); border-radius: 7px; font-family: var(--font); font-size: 12px; color: var(--text-1); outline: none; transition: all var(--t); }
.fg input:focus { border-color: var(--border-hi); background: var(--bg-card); }
.fg input::placeholder { color: var(--text-3); }
.fg-row { display: flex; gap: 10px; }
.fg-row .fg { flex: 1; }
.modal-foot { display: flex; gap: 7px; justify-content: flex-end; margin-top: 20px; }

/* CONFIRM */
.confirm-box { background: var(--bg-surface); border: 1px solid var(--border-md); border-radius: 14px; padding: 22px; width: 340px; max-width: calc(100vw - 2rem); box-shadow: var(--shadow-lg); }
.confirm-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-1); }
.confirm-sub { font-size: 12px; color: var(--text-2); margin-bottom: 18px; line-height: 1.6; }
.confirm-foot { display: flex; gap: 7px; justify-content: flex-end; }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg-surface); border: 1px solid var(--border-md); border-radius: 8px; padding: 9px 14px; font-size: 12px; color: var(--text-1); z-index: 999; box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(6px); transition: all 0.22s ease; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><path d="M17 2H7C5.9 2 5 2.9 5 4v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-5 2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm5 16H7V6h10v14z"/></svg>
    </div>
    <div class="brand-fields">
      <input class="editable-field" id="brand-title" value="Moe Sales CRM" title="Click to edit" spellcheck="false">
      <span class="brand-sep">·</span>
      <input class="editable-field sub" id="brand-sub" value="MobileSentrix" title="Click to edit" spellcheck="false">
    </div>
    <span class="edit-hint" title="Click to edit">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>CSV
    </button>
    <button class="btn btn-ghost" onclick="exportPDF()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>PDF
    </button>
    <button class="btn btn-green" onclick="openAdd()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add client
    </button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg id="ico-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="ico-sun"  viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 18a1 1 0 0 1-1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1-1 1zM4.22 5.64a1 1 0 0 1 1.42-1.42l.7.71a1 1 0 0 1-1.41 1.41l-.71-.7zm13.02 12.72a1 1 0 0 1 1.42-1.42l.7.71a1 1 0 0 1-1.42 1.42l-.7-.71zM3 12a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1zm16 0a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2h-1a1 1 0 0 1-1-1zM5.64 18.36a1 1 0 0 1 0-1.42l.7-.7a1 1 0 0 1 1.42 1.41l-.71.71a1 1 0 0 1-1.41 0zM17.66 6.34a1 1 0 0 1 0-1.42l.7-.71a1 1 0 1 1 1.42 1.42l-.71.71a1 1 0 0 1-1.41 0z"/></svg>
    </button>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="sum-card">
    <div class="sum-label">Total clients</div>
    <div class="sum-sep"></div>
    <div class="sum-val" id="sum-clients">39</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">30-day spend</div>
    <div class="sum-sep"></div>
    <div class="sum-val amber" id="sum-30d">$0</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">2025 spend</div>
    <div class="sum-sep"></div>
    <div class="sum-val green" id="sum-2025">$0</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="search" placeholder="Search by CID, name or business…" oninput="render()">
  </div>
  <div class="view-seg">
    <button class="vseg-btn active" id="vg" onclick="setView('grid')" title="Grid view">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button class="vseg-btn" id="vt" onclick="setView('table')" title="Table view">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="18" height="2" rx="1"/><rect x="3" y="11" width="18" height="2" rx="1"/><rect x="3" y="17" width="18" height="2" rx="1"/></svg>
    </button>
  </div>
  <span class="count-chip" id="chip">39 clients</span>
</div>

<!-- MAIN -->
<div class="main">
  <div class="grid" id="grid-view"></div>
  <div class="tbl-wrap" id="tbl-view" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Contact</th>
          <th>CID</th>
          <th>Business</th>
          <th>30-Day Spend</th>
          <th>2025 Spend</th>
          <th style="width:72px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty" id="empty" style="display:none">No results found.</div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Add client</span>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-section">Client info</div>
    <div class="fg"><label>CID</label><input type="text" id="f-cid" placeholder="e.g. 123456"></div>
    <div class="fg"><label>Contact name</label><input type="text" id="f-name" placeholder="First name or full name"></div>
    <div class="fg"><label>Business name</label><input type="text" id="f-biz" placeholder="Store or business name"></div>
    <div class="modal-section">Spending</div>
    <div class="fg-row">
      <div class="fg"><label>30-Day Spend ($)</label><input type="number" id="f-spend30" placeholder="0.00" min="0" step="0.01"></div>
      <div class="fg"><label>2025 Spend ($)</label><input type="number" id="f-spend2025" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="overlay" id="conf-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Remove client?</div>
    <div class="confirm-sub" id="conf-msg">This client will be permanently removed.</div>
    <div class="confirm-foot">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-red" onclick="doDelete()">Remove</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let clients = [
  {id:1,  cid:"96065",   name:"Eric",          biz:"Cellular Nerd",                              spend30:0, spend2025:0},
  {id:2,  cid:"261510",  name:"Salmaan",        biz:"Salmaan Phone Repair",                       spend30:0, spend2025:0},

  {id:7,  cid:"192787",  name:"Daniel",         biz:"Quick Repair",                               spend30:0, spend2025:0},
  {id:8,  cid:"198468",  name:"Evan",           biz:"Evo Repairs",                                spend30:0, spend2025:0},
  {id:9,  cid:"211580",  name:"Waseem",         biz:"ABC 95TH/215 Cellular Inc",                  spend30:0, spend2025:0},
  {id:10, cid:"230802",  name:"Mehdi",          biz:"Phone Repair",                               spend30:0, spend2025:0},
  {id:11, cid:"234465",  name:"Melissa",        biz:"Kool Shade Inc DBA Cell Fashion",            spend30:0, spend2025:0},
  {id:12, cid:"237075",  name:"Chris",          biz:"Wireless Support",                           spend30:0, spend2025:0},
  {id:13, cid:"265905",  name:"Matthew",        biz:"SilverTech Repair",                          spend30:0, spend2025:0},
  {id:14, cid:"271263",  name:"Manny",          biz:"iRepair Smartphones & Tablets",              spend30:0, spend2025:0},
  {id:15, cid:"317973",  name:"Zoheb",          biz:"ATS Wireless Inc",                           spend30:0, spend2025:0},
  {id:16, cid:"325072",  name:"Asad",           biz:"The Mobile Fix",                             spend30:0, spend2025:0},
  {id:17, cid:"327353",  name:"Shamim",         biz:"Naz's Boutique & Spa",                       spend30:0, spend2025:0},
  {id:18, cid:"327741",  name:"Naser",          biz:"Phone Shack",                                spend30:0, spend2025:0},
  {id:19, cid:"329160",  name:"Narinder",       biz:"The iShop Mobile Experts",                   spend30:0, spend2025:0},
  {id:20, cid:"113223",  name:"Raphael",        biz:"Vineland iPlug Repair Center",               spend30:0, spend2025:0},
  {id:21, cid:"124621",  name:"Elinsse",        biz:"PhoneSpot",                                  spend30:0, spend2025:0},
  {id:22, cid:"136309",  name:"Nathaniel",      biz:"Tekton Innovations",                         spend30:0, spend2025:0},
  {id:23, cid:"103127",  name:"Zac",            biz:"Quick Phone Fix",                            spend30:0, spend2025:0},
  {id:24, cid:"234540",  name:"Klaudio",        biz:"Dr.Fixy",                                    spend30:0, spend2025:0},
  {id:25, cid:"113037",  name:"Gabriel",        biz:"Evolution Cell Phone Repairs / Fast And Ready", spend30:0, spend2025:0},
  {id:26, cid:"327889",  name:"Eyad",           biz:"ZamZam Cell",                                spend30:0, spend2025:0},
  {id:27, cid:"327569",  name:"Wesam",          biz:"The One Electronics Repair",                 spend30:0, spend2025:0},
  {id:28, cid:"5548",    name:"Zachariah",      biz:"We Fix N Customize",                         spend30:0, spend2025:0},
  {id:29, cid:"321357",  name:"Zakaria",        biz:"US Repair Inc",                              spend30:0, spend2025:0},
  {id:30, cid:"327895",  name:"Mirza",          biz:"King Wireless & Phone Fix",                  spend30:0, spend2025:0},
  {id:31, cid:"289174",  name:"—",              biz:"Repair Zone",                                spend30:0, spend2025:0},
  {id:32, cid:"318794",  name:"Ali",            biz:"Repair 360",                                 spend30:0, spend2025:0},
  {id:33, cid:"305445",  name:"Naeem",          biz:"Sunshine Wireless",                          spend30:0, spend2025:0},
  {id:34, cid:"327795",  name:"Paul",           biz:"Batteries Plus Sherman & McKinney",          spend30:0, spend2025:0},
  {id:35, cid:"314586",  name:"Sungki",         biz:"Rachael Yang",                               spend30:0, spend2025:0},
  {id:36, cid:"96223",   name:"Hammad",         biz:"Brady Mart",                                 spend30:0, spend2025:0},
  {id:37, cid:"311523",  name:"Hannibal",       biz:"Express Connection Repair Services",         spend30:0, spend2025:0},
  {id:38, cid:"232467",  name:"Mohammad",       biz:"FixMe Phone Repair",                         spend30:0, spend2025:0},
  {id:39, cid:"307728",  name:"—",              biz:"Alphatron LLC",                              spend30:0, spend2025:0},
];

let nextId = 40, view = "grid", editId = null, delId = null;

const PAL = [
  {bg:"rgba(99,102,241,.15)",  fg:"#a5b4fc"},
  {bg:"rgba(16,185,129,.13)",  fg:"#6ee7b7"},
  {bg:"rgba(245,158,11,.13)",  fg:"#fcd34d"},
  {bg:"rgba(236,72,153,.13)",  fg:"#f9a8d4"},
  {bg:"rgba(59,130,246,.14)",  fg:"#93c5fd"},
  {bg:"rgba(239,68,68,.13)",   fg:"#fca5a5"},
  {bg:"rgba(20,184,166,.13)",  fg:"#5eead4"},
  {bg:"rgba(168,85,247,.13)",  fg:"#d8b4fe"},
];
const pal   = i => PAL[i % PAL.length];
const inits = n => (n==="—" ? "?" : n.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase());
const $     = id => document.getElementById(id);
const fmt   = v => v > 0 ? "$" + Number(v).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2}) : "—";

const E_ICO = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
const D_ICO = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;

function filtered() {
  const q = $("search").value.toLowerCase().trim();
  return q ? clients.filter(c => c.cid.includes(q)||c.name.toLowerCase().includes(q)||c.biz.toLowerCase().includes(q)) : [...clients];
}

function updateSummary(list) {
  const total30   = list.reduce((s,c) => s + (c.spend30   || 0), 0);
  const total2025 = list.reduce((s,c) => s + (c.spend2025 || 0), 0);
  $("sum-clients").textContent = list.length;
  $("sum-30d").textContent     = total30   > 0 ? "$" + total30.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "$0";
  $("sum-2025").textContent    = total2025 > 0 ? "$" + total2025.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "$0";
}

function render() {
  const list = filtered();
  $("chip").textContent = list.length + " client" + (list.length!==1?"s":"");
  $("empty").style.display = list.length ? "none" : "block";
  updateSummary(list);

  if (view === "grid") {
    $("grid-view").style.display = list.length ? "grid" : "none";
    $("tbl-view").style.display  = "none";
    $("grid-view").innerHTML = list.map((c,i) => {
      const p = pal(i);
      const nameDisplay = c.name === "—" ? "<span style='color:var(--text-3)'>—</span>" : c.name;
      const s30   = fmt(c.spend30);
      const s2025 = fmt(c.spend2025);
      return `<div class="card">
        <div class="card-btns">
          <div class="ic-btn" onclick="openEdit(${c.id})">${E_ICO}</div>
          <div class="ic-btn danger" onclick="askDel(${c.id},'${c.biz.replace(/'/g,"\\'")}')">${D_ICO}</div>
        </div>
        <div class="card-top">
          <div class="av" style="background:${p.bg};color:${p.fg}">${inits(c.name)}</div>
          <span class="cid-badge">${c.cid}</span>
        </div>
        <div class="sep"></div>
        <div class="card-row">
          <div class="row-lbl">Contact</div>
          <div class="row-val">${nameDisplay}</div>
        </div>
        <div class="card-row">
          <div class="row-lbl">Business</div>
          <div class="row-val strong">${c.biz}</div>
        </div>
        <div class="spend-row">
          <div class="spend-cell">
            <div class="row-lbl">30-Day Spend</div>
            <div class="row-val money amber">${s30}</div>
          </div>
          <div class="spend-cell">
            <div class="row-lbl">2025 Spend</div>
            <div class="row-val money green">${s2025}</div>
          </div>
        </div>
      </div>`;
    }).join("");
  } else {
    $("grid-view").style.display = "none";
    $("tbl-view").style.display  = list.length ? "block" : "none";
    $("tbody").innerHTML = list.map((c,i) => {
      const p = pal(i);
      const nameDisplay = c.name === "—" ? `<span style="color:var(--text-3)">—</span>` : c.name;
      return `<tr>
        <td><div class="td-name"><div class="av-sm" style="background:${p.bg};color:${p.fg}">${inits(c.name)}</div>${nameDisplay}</div></td>
        <td class="td-cid">${c.cid}</td>
        <td class="td-biz">${c.biz}</td>
        <td class="td-money amber">${fmt(c.spend30)}</td>
        <td class="td-money green">${fmt(c.spend2025)}</td>
        <td><div class="td-acts">
          <div class="ic-btn" onclick="openEdit(${c.id})">${E_ICO}</div>
          <div class="ic-btn danger" onclick="askDel(${c.id},'${c.biz.replace(/'/g,"\\'")}')">${D_ICO}</div>
        </div></td>
      </tr>`;
    }).join("");
  }
}

function setView(v) {
  view = v;
  $("vg").classList.toggle("active", v==="grid");
  $("vt").classList.toggle("active", v==="table");
  render();
}

function openAdd() {
  editId = null;
  $("modal-title").textContent = "Add client";
  ["f-cid","f-name","f-biz","f-spend30","f-spend2025"].forEach(id => $(id).value = "");
  $("modal").classList.add("open");
  setTimeout(()=>$("f-cid").focus(), 50);
}
function openEdit(id) {
  const c = clients.find(x=>x.id===id); if(!c) return;
  editId = id;
  $("modal-title").textContent = "Edit client";
  $("f-cid").value      = c.cid;
  $("f-name").value     = c.name === "—" ? "" : c.name;
  $("f-biz").value      = c.biz;
  $("f-spend30").value  = c.spend30   || "";
  $("f-spend2025").value= c.spend2025 || "";
  $("modal").classList.add("open");
  setTimeout(()=>$("f-name").focus(), 50);
}
function closeModal() { $("modal").classList.remove("open"); }

function saveClient() {
  const cid       = $("f-cid").value.trim();
  const name      = $("f-name").value.trim() || "—";
  const biz       = $("f-biz").value.trim();
  const spend30   = parseFloat($("f-spend30").value)   || 0;
  const spend2025 = parseFloat($("f-spend2025").value) || 0;
  if (!cid || !biz) { toast("CID and business name are required."); return; }
  if (editId) {
    const c = clients.find(x=>x.id===editId);
    c.cid=cid; c.name=name; c.biz=biz; c.spend30=spend30; c.spend2025=spend2025;
    toast("Client updated.");
  } else {
    clients.unshift({id:nextId++, cid, name, biz, spend30, spend2025});
    toast("Client added.");
  }
  closeModal(); render();
}

function askDel(id, biz) {
  delId = id;
  $("conf-msg").textContent = `"${biz}" will be permanently removed from the directory.`;
  $("conf-overlay").classList.add("open");
}
function closeConfirm() { $("conf-overlay").classList.remove("open"); }
function doDelete() { clients = clients.filter(c=>c.id!==delId); closeConfirm(); render(); toast("Client removed."); }

function toast(msg) {
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2400);
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute("data-theme")==="dark";
  document.documentElement.setAttribute("data-theme", isDark?"light":"dark");
  $("ico-moon").style.display = isDark ? "none"  : "block";
  $("ico-sun").style.display  = isDark ? "block" : "none";
}

function exportCSV() {
  const list = filtered();
  const csv = [["CID","Contact Name","Business Name","30-Day Spend","2025 Spend"],
    ...list.map(c=>[c.cid, c.name==="—"?"":c.name, c.biz, c.spend30||0, c.spend2025||0])]
    .map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = "client_directory.csv"; a.click();
}

function exportPDF() {
  const {jsPDF} = window.jspdf;
  const title = $("brand-title").value || "Moe Sales CRM";
  const sub   = $("brand-sub").value   || "MobileSentrix";
  const doc   = new jsPDF({orientation:"landscape", unit:"mm", format:"a4"});
  doc.setFillColor(12,12,13); doc.rect(0,0,297,26,"F");
  doc.setTextColor(242,242,243); doc.setFontSize(14); doc.setFont("helvetica","bold");
  doc.text(title, 14, 11);
  doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(138,138,143);
  doc.text(`${sub}  ·  ${filtered().length} clients  ·  Exported ${new Date().toLocaleDateString()}`, 14, 20);
  doc.autoTable({
    startY: 32,
    head: [["CID","Contact Name","Business Name","30-Day Spend","2025 Spend"]],
    body: filtered().map(c=>[
      c.cid,
      c.name==="—"?"—":c.name,
      c.biz,
      c.spend30   > 0 ? "$"+Number(c.spend30).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—",
      c.spend2025 > 0 ? "$"+Number(c.spend2025).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—",
    ]),
    styles: {fontSize:9, cellPadding:4, font:"helvetica"},
    headStyles: {fillColor:[23,23,26], textColor:[138,138,143], fontStyle:"bold", fontSize:8},
    alternateRowStyles: {fillColor:[248,248,250]},
    columnStyles: {
      0:{cellWidth:22, fontStyle:"bold", textColor:[107,107,115]},
      1:{cellWidth:38},
      3:{halign:"right", cellWidth:28},
      4:{halign:"right", cellWidth:28},
    },
    margin: {left:14, right:14},
    tableLineColor:[230,230,235], tableLineWidth:0.2,
  });
  const pages = doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i); doc.setFontSize(7.5); doc.setTextColor(180);
    doc.text(`Page ${i} of ${pages}`, 283, 205, {align:"right"});
  }
  doc.save("client_directory.pdf");
}

document.addEventListener("keydown", e => {
  if(e.key==="Escape") { closeModal(); closeConfirm(); }
  if(e.key==="Enter" && $("modal").classList.contains("open")) saveClient();
});
$("modal").addEventListener("click", e=>{ if(e.target===$("modal")) closeModal(); });
$("conf-overlay").addEventListener("click", e=>{ if(e.target===$("conf-overlay")) closeConfirm(); });

render();
</script>
</body>
</html>
